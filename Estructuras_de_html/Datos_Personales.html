<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Datos Personales</title>
</head>
<body>

    <div>
        <img src="icono-usuario.png" alt="Icono Perfil de Usuario">
        <h1>DATOS PERSONALES</h1>
    </div>

    <form>
        
        <div>
            <label>NOMBRE :</label>
            <input type="text">
        </div>

        <div>
            <label>TELÉFONO :</label>
            <input type="tel">
        </div>

        <div>
            <label>GMAIL :</label>
            <input type="email">
        </div>

        <div>
            <label>CONTRASEÑA:</label>
            <input type="password">
        </div>

    </form>

</body>
</html>
