<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Cakes — Pie de Limón</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="pedido-postre">

    <!-- Botón volver -->
    <button class="btn-volver" onclick="window.location.href='carta-dulce.html'">← Volver</button>

    <div class="container-detalle">

        <!-- COLUMNA IZQUIERDA: imagen -->
        <div class="columna-izquierda">
            <div class="titulo-caja">
                <h1>PIE DE LIMÓN</h1>
            </div>
            <div class="imagen-caja">
                <img src="../assets/imagenes/dulces/pie_pedido.jpg" alt="Pie de Limón">
            </div>
        </div>

        <!-- COLUMNA DERECHA: detalle y opciones -->
        <div class="columna-derecha">
            <h2 style="color:var(--color-cereza); font-family:var(--fuente-titulo);">Descripción</h2>
            <p style="color:var(--color-texto-suave); margin-bottom:18px;">
                El pie de limón es un postre clásico que combina una base crujiente de masa
                o galleta con un relleno cremoso y cítrico a base de limón, coronado por
                una capa suave de merengue tostado.
            </p>

            <h2 style="color:var(--color-cereza); font-family:var(--fuente-titulo);">Especificaciones</h2>
            <ul style="list-style:none; padding:0; font-weight:700; margin-bottom:20px; color:var(--color-texto-suave);">
                <li style="padding:4px 0;">— Porción individual</li>
                <li style="padding:4px 0;">— Pie completo</li>
            </ul>

            <div class="fila-precio">
                <label>Porción — S/ 8.00</label>
                <input type="number" value="1" min="0">
            </div>
            <div class="fila-precio">
                <label>Completo — S/ 68.00</label>
                <input type="number" value="0" min="0">
            </div>

            <button class="btn-rosa">Añadir al Carrito</button>

            <div class="fila-resumen">
                <div class="campo-bloque">
                    <label>Pedido:</label>
                    <input type="text" readonly placeholder="—">
                </div>
                <div class="campo-bloque">
                    <label>Total:</label>
                    <input type="text" readonly placeholder="S/ 0.00">
                </div>
            </div>

            <button class="btn-rosa" onclick="window.location.href='checkout.html'">Ir a Pagar</button>
        </div>

    </div>

</body>
</html>
