<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalle del Producto - Pie de Limón</title>
    <link rel="stylesheet" href="../css/stylep.css">
</head>
<body class="pedido-postre">

    <button type="button" class="btn-volver">
        <a href="registrado.html">
            VOLVER
        </a>
    </button>

    <div class="container-detalle">
        <!-- COLUMNA IZQUIERDA -->
        <div class="columna-izquierda">
            <div class="titulo-caja"><h1>PIE LIMON</h1></div>
            <div class="imagen-caja">
                <img src="../assets/imagenes/dulces/pie_pedido.jpg" alt="Pie de Limón">
            </div>
           
        </div>

        <!-- COLUMNA DERECHA -->
        <div class="columna-derecha">
            <h2>DESCRIPCION :</h2>
            <p>El pie de limón es un postre clásico que combina una base crujiente de masa o galleta con un relleno cremoso y cítrico a base de limón, coronado por una capa suave de merengue tostado</p>

            <h2>ESPECIFICACIONES :</h2>
            <ul style="list-style:none; padding:0; font-weight:bold; margin-bottom:20px;">
                <li>- 1 Tajada</li>
                <li>- Completo</li>
            </ul>

            <div class="fila-precio">
                <label>PRECIO : $8.00(individual)</label>
                <input type="number" value="1" min="0">
            </div>
            <div class="fila-precio">
                <label>$68 (completo)</label>
                <input type="number" value="1" min="0">
            </div>

            <button type="button" class="btn-rosa">AÑADIR AL CARRITO</button>

            <div class="fila-resumen">
                <div class="campo-bloque">
                    <label>PEDIDO :</label>
                    <input type="text" readonly>
                </div>
                <div class="campo-bloque">
                    <label>TOTAL</label>
                    <input type="text" readonly>
                </div>
            </div>

            <button type="button" class="btn-rosa">IR A PAGAR</button>
        </div>
    </div>

</body>
</html>
