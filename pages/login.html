<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Cakes — Iniciar Sesión</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/stylelogin.css">
    <link rel="stylesheet" href="../css/stylem.css">
</head>
<body>

    <!-- ====== PÁGINA DE LOGIN ====== -->
    <!-- .pagina-auth centra la caja en toda la pantalla con fondo degradado rosado -->
    <div class="pagina-auth">

        <!-- Caja blanca del formulario -->
        <div class="login-box">

            <!-- Botón para volver al inicio -->
            <a href="Inicio.html" class="btn-atras">← Atrás</a>

            <!-- Título y subtítulo -->
            <h1>¡Bienvenid@!</h1>
            <p>Inicia sesión para continuar</p>

            <!-- Campo de correo -->
            <div class="input-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="Ingresa tu correo">
            </div>

            <!-- Campo de contraseña -->
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Ingresa tu contraseña">
            </div>

            <!-- Botón principal de login (el onclick se conecta al JS que ya tenías) -->
            <button type="button" class="login-btn" onclick="validarLogin()">
                Iniciar sesión
            </button>
            
            <!-- Botón de Google -->
            <button type="button" class="google-btn">
                <!-- Aquí puedes poner el logo de Google como <img> cuando lo tengas -->
                Continuar con Google
            </button>

        </div>
    </div>

 <!-- Script de validación (el que ya tenías) -->
 <script>
    function validarLogin() {
        const email = document.getElementById('email').value;
        const pass  = document.getElementById('password').value;
        if (email !== "" && pass !== "") {
            window.location.href = "Inicio_Registrado.html";
        } else {
            alert("Por favor, completa ambos campos para continuar.");
        }
    }
</script>


</body>
</html>
