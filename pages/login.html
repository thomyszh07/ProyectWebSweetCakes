<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Cakes — Iniciar Sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

    <!-- ====== PÁGINA DE LOGIN ====== -->
    <div class="pagina-auth">
        <div class="login-box">

            <!-- Cabecera verde -->
            <div class="login-header">
                <h1>🍰 Sweet Cakes</h1>
            </div>

            <!-- Contenido del formulario -->
            <div class="login-content">

                <a href="../index.html" class="btn-atras">← Volver al inicio</a>

                <div>
                    <p style="font-family:var(--fuente-titulo); font-size:1.3rem; color:var(--color-texto); font-weight:700;">¡Bienvenid@!</p>
                    <p style="font-size:0.88rem; color:var(--color-texto-suave);">Inicia sesión para continuar</p>
                </div>

                <!-- Correo -->
                <div class="input-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="correo@ejemplo.com">
                </div>

                <!-- Contraseña -->
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Tu contraseña">
                </div>

                <!-- Botón principal -->
                <button class="login-btn" onclick="validarLogin()">Iniciar sesión</button>

                <!-- Botón Google -->
                <button class="google-btn">🔵 Continuar con Google</button>

                <p style="font-size:0.8rem; text-align:center; color:var(--color-texto-suave);">
                    ¿No tienes cuenta? <a href="#" style="color:var(--color-cereza); font-weight:700;">Regístrate aquí</a>
                </p>

            </div>
        </div>
    </div>

    <script>
        function validarLogin() {
            const email = document.getElementById('email').value;
            const pass  = document.getElementById('password').value;
            if (email !== "" && pass !== "") {
                window.location.href = "registrado.html";
            } else {
                alert("Por favor, completa ambos campos para continuar.");
            }
        }
    </script>

</body>
</html>
